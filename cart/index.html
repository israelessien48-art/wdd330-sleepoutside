<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Cart</title>

    <link rel="stylesheet" href="../src/css/style.css" />

    <script src="../src/js/cart.js" type="module"></script>
  </head>

  <body>
    <header id="main-header" class="divider"></header>

    <main class="divider">
      <section class="products">
        <h2>My Cart</h2>

        <p class="cart-empty" hidden>
          Your cart is empty. Add a tent to see it here.
        </p>

        <ul class="product-list cart-list"></ul>

        <div class="cart-footer" hidden>
          <div class="cart-total">
            <span>Total</span>
            <strong class="cart-total__amount">$0.00</strong>
          </div>
          <a class="button-link" href="../checkout/">Checkout</a>
        </div>
      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
