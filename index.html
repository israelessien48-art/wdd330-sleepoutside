<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="./src/css/style.css" />
    <script src="./src/js/main.js" type="module"></script>
  </head>

  <body>
    <header id="main-header" class="divider"></header>
    <main class="divider">
      <div class="hero">
        <img
          src="./images/banner-sm.jpg"
          srcset="./images/banner-sm.jpg 500w, ./images/banner.jpg"
          alt="image of a high mountain lake"
        />
        <div class="logo logo--square">
          <img src="./images/noun_Tent_2517.svg" alt="tent image for logo" />
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>
        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
      </div>

      <section class="products">
        <h2>Top Products</h2>
        <ul class="product-list"></ul>
      </section>

      <section class="categories">
        <h2>Shop by Category</h2>
        <div class="category-cards">
          <a href="src/product_listing/index.html?category=tents" class="category-card">
            <img src="https://byui-cse.github.io/wdd330-ww-course/images/category-tents.svg" alt="Tents" class="category-card__icon">
            <h3>Tents</h3>
          </a>
          <a href="src/product_listing/index.html?category=backpacks" class="category-card">
            <img src="https://byui-cse.github.io/wdd330-ww-course/images/category-backpacks.svg" alt="Backpacks" class="category-card__icon">
            <h3>Backpacks</h3>
          </a>
          <a href="src/product_listing/index.html?category=sleeping-bags" class="category-card">
            <img src="https://byui-cse.github.io/wdd330-ww-course/images/category-sleepingbags.svg" alt="Sleeping Bags" class="category-card__icon">
            <h3>Sleeping Bags</h3>
          </a>
          <a href="src/product_listing/index.html?category=hammocks" class="category-card">
            <img src="https://byui-cse.github.io/wdd330-ww-course/images/category-hammocks.svg" alt="Hammocks" class="category-card__icon">
            <h3>Hammocks</h3>
          </a>
        </div>
      </section>
    </main>
    <footer id="main-footer"></footer>
  </body>
</html>
